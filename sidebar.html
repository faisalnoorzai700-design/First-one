<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,100,1,200&icon_names=favorite,home,search,settings"
        rel="stylesheet" />
    <link rel="stylesheet" href="sidebar.css">

    <title>sidebar</title>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="img/flag.png" alt="flag">
            <h2>Afghan</h2>
            <ul class="sidebar-link">
                <li><a href="#">
                        <span class="material-symbols-outlined">search</span>
                    </a></li>
                <li><a href="#">
                        <span class="material-symbols-outlined"></span>
                    </a></li>
                <span class="material-symbols-outlined">search</span>
                <span class="material-symbols-outlined">home</span>
                <span class="material-symbols-outlined">settings</span>
                <li>
                    <span class="material-symbols-outlined">favorite</span>
                </li>

            </ul>
        </div>
    </aside>
    <input name="username" id="username" />
    <input id="address" /> <br>

    <input name="delivery_option" type="radio" value="pickup" />
    <input name="delivery_option" type="radio" value="delivery" />

    <label for="password ">Password:</label>
    <input type="text" id="password" name="password"><br>

    <select class="select">
        <option value="small">Small</option>
        <option value="family">Family Sedan</option>
        <option value="lux">Luxury</option>
    </select>

    <label for="fname">First name:</label>
    <input type="text" name="fname" id="fname"><br>


    <input type="number" min="1" max="100">

    <input type="checkbox" name="vehicle" value="Bike"> I own a bike
</body>

</html>
